version: "3.8"

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      -  ~/tools/mongodb:/data/db
    networks:
      - appnet

  ai-service:
    build:
      context: ./AiModule
      dockerfile: Dockerfile
    image: ai-module:dev
    restart: on-failure
    volumes:
      - ./AiModule/data:/app/data
    environment:
      - DNNL_DISABLE_JIT=1
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/50051"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - appnet
    ports:
      - "50051:50051"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend:dev
    restart: on-failure
    depends_on:
      mongo:
        condition: service_started
      ai-service:
        condition: service_started
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - GRPC_URL=ai-service:50051
    networks:
      - appnet
    ports:
      - "38080:38080"

  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
    image: frontend:dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - appnet

volumes:
  mongo-data:

networks:
  appnet:
    driver: bridge
