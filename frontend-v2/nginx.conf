server {
  listen 80;
  server_name localhost;

  
  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:38080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
